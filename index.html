<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skye — Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8eaf2;
      --muted: rgba(232,234,242,0.45);
      --accent: #7eb8f7;
      --accent2: #f7c77e;
      --glow: rgba(126,184,247,0.15);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(126,184,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(247,199,126,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-style: italic;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    /* Search */
    .search-wrap {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.85rem 1.1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    button {
      background: var(--accent);
      color: #0a0e1a;
      border: none;
      border-radius: 6px;
      padding: 0.85rem 1.4rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 400;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.2s, transform 0.15s;
    }

    button:hover { opacity: 0.85; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    /* Weather card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      animation: fadeUp 0.5s ease forwards;
      display: none;
    }

    .card.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .city-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.3rem;
    }

    .city-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      line-height: 1.1;
    }

    .country {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .date-line {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 2rem;
    }

    .main-weather {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .weather-icon {
      font-size: 4.5rem;
      line-height: 1;
      filter: drop-shadow(0 0 20px var(--glow));
    }

    .temp-block {}

    .temp {
      font-family: 'Playfair Display', serif;
      font-size: 3.8rem;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--accent2);
    }

    .feels {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .description {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      margin-top: 0.2rem;
    }

    /* Stats grid */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .stat {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
    }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .stat-value {
      font-size: 1.1rem;
      color: var(--accent);
    }

    /* Error */
    .error {
      text-align: center;
      color: #f7877e;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      margin-top: 1rem;
      display: none;
    }

    .error.visible { display: block; }

    /* Loading */
    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      margin-top: 1rem;
      display: none;
    }

    .loading.visible { display: block; }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Sk<span>y</span>e</div>
      <div class="tagline">Real-time weather lookup</div>
    </header>

    <div class="search-wrap">
      <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off" />
      <button id="searchBtn">Search</button>
    </div>

    <div class="loading" id="loading">Fetching weather data...</div>
    <div class="error" id="error">City not found. Please try again.</div>

    <div class="card" id="card">
      <div class="city-line">
        <div class="city-name" id="cityName">—</div>
        <div class="country" id="country">—</div>
      </div>
      <div class="date-line" id="dateLine">—</div>

      <div class="main-weather">
        <div class="weather-icon" id="weatherIcon">🌤️</div>
        <div class="temp-block">
          <div class="temp" id="temp">—</div>
          <div class="description" id="description">—</div>
          <div class="feels" id="feels">Feels like —</div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Humidity</div>
          <div class="stat-value" id="humidity">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Wind Speed</div>
          <div class="stat-value" id="wind">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Visibility</div>
          <div class="stat-value" id="visibility">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Pressure</div>
          <div class="stat-value" id="pressure">—</div>
        </div>
      </div>
    </div>

    <footer>Powered by OpenWeatherMap &nbsp;·&nbsp; Built by Krupakar</footer>
  </div>

  <script>
    const API_KEY = '733a412dddc3dc47ac83c22aa679552e';
    const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';

    const input = document.getElementById('cityInput');
    const btn = document.getElementById('searchBtn');
    const card = document.getElementById('card');
    const errorEl = document.getElementById('error');
    const loadingEl = document.getElementById('loading');

    const weatherIcons = {
      '01': '☀️', '02': '⛅', '03': '☁️', '04': '☁️',
      '09': '🌧️', '10': '🌦️', '11': '⛈️', '13': '❄️', '50': '🌫️'
    };

    function getIcon(iconCode) {
      const prefix = iconCode.slice(0, 2);
      return weatherIcons[prefix] || '🌡️';
    }

    function formatDate() {
      return new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function kelvinToCelsius(k) { return (k - 273.15).toFixed(1); }

    function show(el) { el.classList.add('visible'); }
    function hide(el) { el.classList.remove('visible'); }

    async function fetchWeather(city) {
      hide(card); hide(errorEl);
      show(loadingEl);

      try {
        
        const res = await fetch(`${BASE_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}`);
        const data = await res.json();

        hide(loadingEl);

        if (data.cod !== 200) {
          show(errorEl);
          return;
        }

        document.getElementById('cityName').textContent = data.name;
        document.getElementById('country').textContent = data.sys.country;
        document.getElementById('dateLine').textContent = formatDate();
        document.getElementById('weatherIcon').textContent = getIcon(data.weather[0].icon);
        document.getElementById('temp').textContent = kelvinToCelsius(data.main.temp) + '°C';
        document.getElementById('description').textContent = data.weather[0].description;
        document.getElementById('feels').textContent = `Feels like ${kelvinToCelsius(data.main.feels_like)}°C`;
        document.getElementById('humidity').textContent = data.main.humidity + '%';
        document.getElementById('wind').textContent = data.wind.speed + ' m/s';
        document.getElementById('visibility').textContent = (data.visibility / 1000).toFixed(1) + ' km';
        document.getElementById('pressure').textContent = data.main.pressure + ' hPa';

        // re-trigger animation
        card.classList.remove('visible');
        void card.offsetWidth;
        show(card);

      } catch (err) {
        hide(loadingEl);
        errorEl.textContent = 'Network error. Please check your connection.';
        show(errorEl);
      }
    }

    btn.addEventListener('click', () => {
      const city = input.value.trim();
      if (city) fetchWeather(city);
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const city = input.value.trim();
        if (city) fetchWeather(city);
      }
    });
  </script>
</body>
</html>
